## sdl_formats.conf
## Format/decoder support configuration for SDL_image and SDL_sound.
## Edit this file and re-run build.bat (option 3) to rebuild with new settings.
## Note: no spaces around the = sign.

## SDL_image formats (ON = built-in, OFF = excluded from binary)
IMAGE_PNG=ON
IMAGE_GIF=ON
IMAGE_JPG=ON
IMAGE_SVG=ON

IMAGE_BMP=OFF
IMAGE_QOI=OFF
IMAGE_TGA=OFF
IMAGE_TIFF=OFF
IMAGE_AVIF=OFF
IMAGE_WEBP=OFF
IMAGE_PNM=OFF
IMAGE_XCF=OFF
IMAGE_PCX=OFF
IMAGE_LBM=OFF

## SDL_sound audio decoders (ON = built-in, OFF = excluded)
## Note: AUDIO_OGG = Ogg Vorbis (libvorbis/stb_vorbis)
AUDIO_OGG=ON
AUDIO_MP3=ON

AUDIO_WAV=OFF
AUDIO_FLAC=OFF
AUDIO_OPUS=OFF
AUDIO_AIFF=OFF
AUDIO_AU=OFF
AUDIO_MIDI=OFF
AUDIO_MODPLUG=OFF
AUDIO_SHN=OFF
AUDIO_RAW=OFF
